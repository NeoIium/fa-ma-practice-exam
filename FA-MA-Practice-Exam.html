<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FA / MA — Practice Exam (SOWISO style)</title>
<style>
  :root{
    --bg:#e6e7f6; --card:#ffffff; --ink:#3c3c5c; --muted:#6b6b86;
    --accent:#b81f63; --accent2:#c0286e; --navy:#3f3d56; --blue:#3f6fb0;
    --line:#e3e3ee; --green:#cfe6a4; --greenHead:#bcd98a; --greenInk:#3a4a23;
    --good:#3f8a3f; --bad:#c0392b; --dotgrey:#cfcfe0; --dotgreen:#5fb15f; --dotred:#d98b8b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Segoe UI",Nunito,system-ui,-apple-system,Arial,sans-serif;
    background:var(--bg); color:var(--ink); display:flex; min-height:100vh;
  }
  /* ---------- Sidebar ---------- */
  #sidebar{
    width:280px; flex:0 0 280px; background:#f4f4fb; border-right:1px solid #dcdcec;
    height:100vh; overflow-y:auto; padding:18px 14px 40px;
  }
  #sidebar h1{font-size:17px; margin:4px 6px 2px; color:var(--navy)}
  #sidebar .sub{font-size:12px; color:var(--muted); margin:0 6px 14px}
  .score{background:#fff;border:1px solid #e0e0ee;border-radius:12px;padding:10px 12px;margin:0 4px 16px;font-size:13px}
  .score b{font-size:20px;color:var(--accent)}
  .score .bar{height:8px;border-radius:6px;background:#ececf5;margin-top:8px;overflow:hidden}
  .score .bar i{display:block;height:100%;background:var(--dotgreen);width:0%}
  .secttl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--accent);margin:16px 8px 6px}
  .navitem{
    display:flex;align-items:center;gap:9px;padding:7px 10px;margin:2px 2px;border-radius:9px;
    cursor:pointer;font-size:13.5px;color:var(--ink);
  }
  .navitem:hover{background:#ececf8}
  .navitem.active{background:#e3e1f5;font-weight:600}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--dotgrey);flex:0 0 11px;border:1px solid rgba(0,0,0,.06)}
  .dot.correct{background:var(--dotgreen)}
  .dot.attempted{background:var(--dotred)}
  .navitem .pts{margin-left:auto;font-size:11px;color:var(--muted)}
  .resetbtn{margin:18px 6px 0;font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline}

  /* ---------- Main ---------- */
  #main{flex:1;height:100vh;overflow-y:auto;padding:34px 26px 40px;display:block}
  .stage{width:100%;max-width:940px;margin:0 auto;padding-bottom:48px}
  .progressdots{display:flex;gap:8px;margin:0 0 14px 4px}
  .progressdots .d{width:15px;height:15px;border-radius:50%;background:var(--dotgrey);border:2px solid #fff;box-shadow:0 0 0 1px #d0d0e0}
  .progressdots .d.correct{background:var(--dotgreen);box-shadow:0 0 0 1px var(--dotgreen)}
  .progressdots .d.attempted{background:var(--dotred);box-shadow:0 0 0 1px var(--dotred)}

  .card{background:var(--card);border-radius:18px;box-shadow:0 10px 30px rgba(60,60,110,.10);padding:30px 34px 34px;position:relative}
  .crumb{font-size:12.5px;color:var(--muted);margin-bottom:6px}
  .qtitle{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:800;color:var(--navy);margin:2px 0 0}
  .qtitle .pencil{color:var(--accent)}
  .qtitle .badge{margin-left:auto;font-size:12px;font-weight:700;color:#fff;background:var(--accent);padding:3px 10px;border-radius:20px}
  .rule{height:3px;background:var(--accent);border:0;border-radius:3px;margin:14px 0 20px}
  .context{background:#f7f7fc;border:1px solid #ececf5;border-radius:12px;padding:14px 18px;margin-bottom:18px;font-size:14.5px;line-height:1.55}
  .context h4{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--accent)}
  .qbody{font-size:15.5px;line-height:1.6}
  .qbody p{margin:0 0 12px}
  .instr{font-weight:700}
  .note{font-style:italic;color:var(--muted);font-size:14px}

  table.data{border-collapse:collapse;width:100%;margin:10px 0 4px;font-size:14px}
  table.data th,table.data td{border:1px solid #dadaea;padding:7px 11px;text-align:left}
  table.data th{background:#f0f0f8;font-weight:700}
  table.data td.num{text-align:right;font-variant-numeric:tabular-nums}

  /* MC */
  .opts{display:flex;flex-direction:column;gap:10px;margin:6px 0 4px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1.5px solid #e0e0ee;border-radius:11px;padding:12px 15px;cursor:pointer;font-size:15px;line-height:1.45;transition:.12s}
  .opt:hover{border-color:#c9c9e6;background:#fafaff}
  .opt .mark{flex:0 0 20px;width:20px;height:20px;border-radius:50%;border:2px solid #c2c2da;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
  .opt.sel{border-color:var(--blue);background:#eef3fb}
  .opt.sel .mark{border-color:var(--blue);background:var(--blue)}
  .opt.right{border-color:var(--good);background:#eef7ec}
  .opt.right .mark{border-color:var(--good);background:var(--good)}
  .opt.rightmid{border-color:#e0a32e;background:#fdf6e6}
  .opt.rightmid .mark{border-color:#e0a32e;background:#e0a32e}
  .opt.wrong{border-color:var(--bad);background:#fbeeec}
  .opt.wrong .mark{border-color:var(--bad);background:var(--bad)}

  /* Journal / answer table */
  table.jrnl{border-collapse:collapse;width:100%;margin:8px 0 6px;font-size:14.5px}
  table.jrnl th,table.jrnl td{border:1px solid #e1e1ee;padding:9px 12px;text-align:left;vertical-align:middle}
  table.jrnl th{font-weight:700}
  table.jrnl .num{text-align:right}
  .selacct{appearance:none;background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23666'/></svg>") no-repeat right 12px center;
    border:1.5px solid #d3d3e4;border-radius:22px;padding:8px 30px 8px 16px;font-size:14px;color:var(--ink);cursor:pointer;min-width:170px}
  .amt{width:120px;border:none;border-bottom:2px solid #c9c9dc;background:transparent;text-align:right;font-size:15px;padding:5px 2px;color:var(--ink);font-variant-numeric:tabular-nums}
  .amt:focus{outline:none;border-bottom-color:var(--accent)}
  .amt.ok{border-bottom-color:var(--good);color:var(--good)}
  .amt.no{border-bottom-color:var(--bad);color:var(--bad)}
  .trash{color:#d05050;cursor:pointer;font-size:18px;border:none;background:none}
  .addrow{display:inline-flex;align-items:center;gap:7px;background:var(--blue);color:#fff;border:none;border-radius:22px;padding:9px 18px;font-size:14px;cursor:pointer;margin-top:6px}
  .addrow:hover{filter:brightness(1.05)}

  /* numeric fields */
  .nfield{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:15px;flex-wrap:wrap}
  .nfield label{min-width:230px;color:var(--ink)}
  .nfield .pre{color:var(--muted)}
  .ninput{border:none;border-bottom:2px solid #c9c9dc;background:transparent;font-size:16px;padding:5px 4px;width:160px;text-align:right;color:var(--ink);font-variant-numeric:tabular-nums}
  .ninput:focus{outline:none;border-bottom-color:var(--accent)}
  .ninput.ok{border-bottom-color:var(--good);color:var(--good)}
  .ninput.no{border-bottom-color:var(--bad);color:var(--bad)}
  .ftick{font-size:16px;width:18px}
  .ftick.ok{color:var(--good)} .ftick.no{color:var(--bad)}

  /* buttons */
  .actions{display:flex;align-items:center;gap:12px;margin-top:24px;flex-wrap:wrap}
  .btn{border-radius:24px;padding:11px 22px;font-size:15px;cursor:pointer;border:2px solid transparent;display:inline-flex;align-items:center;gap:8px;font-weight:600}
  .btn.check{background:var(--navy);color:#fff}
  .btn.check:hover{filter:brightness(1.08)}
  .btn.ghost{background:#fff;color:var(--accent);border-color:var(--accent)}
  .btn.ghost:hover{background:#fdeef4}
  .spacer{margin-left:auto}
  .feedback{margin-top:16px;font-size:15px;font-weight:600;display:none}
  .feedback.show{display:block}
  .feedback.good{color:var(--good)}
  .feedback.bad{color:var(--bad)}
  .toast{display:none;align-items:center;gap:8px;background:#e7f3d8;border:1px solid #cfe6a4;color:var(--greenInk);
    border-radius:10px;padding:9px 14px;font-size:14px;margin-bottom:14px}
  .toast.show{display:flex}

  /* solution panel */
  .solution{display:none;margin-top:20px;background:var(--green);border-radius:14px;padding:20px 22px;font-size:14.5px;line-height:1.6;color:var(--greenInk)}
  .solution.show{display:block}
  .solution h4{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.05em}
  .solution table{border-collapse:collapse;width:100%;margin:6px 0 12px;background:rgba(255,255,255,.35);font-size:14px}
  .solution table th,.solution table td{border:1px solid rgba(0,0,0,.12);padding:7px 11px}
  .solution table th{background:var(--greenHead);text-align:left}
  .solution .num{text-align:right;font-variant-numeric:tabular-nums}
  .solution .je{margin:4px 0;display:grid;grid-template-columns:30px 1fr 120px;gap:6px;align-items:start}
  .solution .je .acc{font-weight:600}
  .solution .je.indent{padding-left:26px}
  .solution .amt2{text-align:right;font-variant-numeric:tabular-nums}
  .solution .ex{color:#4f6033;font-size:13px;font-style:italic;margin:2px 0 10px 0}
  .solution .warn{background:#fff4d6;border:1px solid #e8d28a;color:#7a5b12;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-style:normal}

  /* nav prev/next */
  .pager{display:flex;justify-content:space-between;margin:22px 4px 0}
  .pager button{background:#fff;border:1px solid #d8d8ea;border-radius:22px;padding:9px 18px;cursor:pointer;font-size:14px;color:var(--navy)}
  .pager button:hover{background:#f1f1fb}
  .pager button:disabled{opacity:.4;cursor:default}

  /* calculator modal */
  #calcModal{position:fixed;inset:0;background:rgba(40,40,70,.35);display:none;align-items:center;justify-content:center;z-index:50}
  #calcModal.show{display:flex}
  .calc{background:#fff;border-radius:16px;padding:16px;width:260px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .calc .disp{background:#f3f3fa;border-radius:10px;padding:12px 14px;text-align:right;font-size:22px;min-height:30px;margin-bottom:10px;font-variant-numeric:tabular-nums;overflow:hidden}
  .calc .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .calc button{border:none;border-radius:10px;padding:13px 0;font-size:16px;cursor:pointer;background:#eee;color:#333}
  .calc button:hover{filter:brightness(.96)}
  .calc button.op{background:#e7e2f3;color:var(--navy)}
  .calc button.eq{background:var(--navy);color:#fff}
  .calc button.fn{background:#f3dde7;color:var(--accent)}
  .calc .close{margin-top:10px;width:100%;background:#fff;border:1px solid #ddd;border-radius:10px;padding:8px;cursor:pointer}

  /* ---------- mobile top bar + drawer (hidden on desktop) ---------- */
  #topbar{display:none}
  #drawerOverlay{display:none}

  @media(max-width:820px){
    body{display:block;min-height:100vh}
    /* fixed top bar */
    #topbar{display:flex;align-items:center;gap:10px;position:fixed;top:0;left:0;right:0;height:54px;
      background:#fff;border-bottom:1px solid #e0e0ee;z-index:40;padding:0 12px;box-shadow:0 2px 8px rgba(60,60,110,.06)}
    .menubtn{border:none;background:#f1f1fb;color:var(--navy);font-size:20px;line-height:1;width:40px;height:40px;border-radius:10px;cursor:pointer;flex:0 0 40px}
    .tbtitle{font-weight:800;color:var(--navy);font-size:15px}
    .minitimer{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:800;font-size:19px;color:var(--navy);padding:6px 10px;border-radius:9px;background:#f4f4fb;min-width:82px;text-align:center}
    .minitimer.up{color:var(--bad)}
    /* sidebar becomes a slide-in drawer */
    #sidebar{position:fixed;top:0;bottom:0;left:0;height:100vh;max-height:none;width:86%;max-width:330px;
      flex:none;transform:translateX(-100%);transition:transform .25s ease;z-index:55;box-shadow:6px 0 30px rgba(0,0,0,.25);overflow-y:auto}
    #sidebar.open{transform:translateX(0)}
    #drawerOverlay{display:block;position:fixed;inset:0;background:rgba(40,40,70,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
    #drawerOverlay.open{opacity:1;pointer-events:auto}
    /* main content full width */
    #main{height:auto;padding:66px 12px 36px}
    .stage{padding-bottom:36px}
    .card{padding:18px 15px 22px;border-radius:16px}
    .qtitle{font-size:21px}
    .crumb{font-size:12px}
    .context{font-size:14px;padding:13px 15px}
    table.data,table.jrnl{font-size:13.5px}
    /* bigger touch targets */
    .opt{padding:14px 15px;font-size:15.5px}
    .ninput,.amt,.selacct{font-size:16px}   /* >=16px stops iOS zoom-on-focus */
    .selacct{padding:10px 30px 10px 16px;min-width:150px}
    .amt{width:108px}
    .nfield label{min-width:160px}
    .actions{gap:10px;margin-top:20px}
    .btn{padding:12px 18px;font-size:15px}
    .pager{gap:10px}
    .pager button{flex:1;padding:14px 10px;font-size:15px}
  }
  /* mode + timer + handin */
  .modepanel{display:flex;gap:6px;margin:2px 4px 8px}
  .modebtn{flex:1;border:1.5px solid #d8d8ea;background:#fff;border-radius:10px;padding:8px 4px;font-size:13px;cursor:pointer;color:var(--ink)}
  .modebtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .modehint{font-size:11.5px;color:var(--muted);margin:0 6px 12px}
  .timerbox{background:#fff;border:1px solid #e0e0ee;border-radius:12px;padding:10px;margin:0 4px 14px;text-align:center}
  .timer{font-size:27px;font-variant-numeric:tabular-nums;font-weight:800;color:var(--navy);letter-spacing:1px}
  .timer.up{color:var(--bad)}
  .timeup{font-size:11px;color:var(--bad);margin-top:3px}
  .trow{display:flex;gap:5px;margin-top:9px}
  .tbtn{flex:1;border:1px solid #ddd;background:#f6f6fc;border-radius:8px;padding:6px 3px;font-size:11px;cursor:pointer;color:var(--ink)}
  .tbtn.wide{width:100%}
  .tbtn:hover{background:#ececf8}
  .handin{display:block;width:calc(100% - 8px);margin:0 4px 14px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
  .handin:hover{filter:brightness(1.06)}
  .gradebig{font-size:34px;font-weight:800;color:var(--accent);line-height:1}
  .gradebig span{font-size:15px;color:var(--muted);font-weight:600}
  .gradesub{font-size:12px;color:var(--muted);margin:4px 0 8px}
  .reviewbtn{margin-top:9px;width:100%;background:#fff;border:1px solid var(--accent);color:var(--accent);border-radius:8px;padding:7px;font-size:12px;cursor:pointer}
  .reviewbtn:hover{background:#fdeef4}
  .d.partial{background:#e3b341;box-shadow:0 0 0 1px #e3b341}
  .d.answered{background:#9aa6e0;box-shadow:0 0 0 1px #9aa6e0}
  .dot.partial{background:#e3b341}
  .dot.answered{background:#9aa6e0}
  .feedback.mid{color:#9a7d1e}
  .exnote{font-size:13px;color:var(--muted)}
  /* results modal */
  #resultsModal{position:fixed;inset:0;background:rgba(40,40,70,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  #resultsModal.show{display:flex}
  .results{background:#fff;border-radius:18px;padding:26px 30px;max-width:640px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.35)}
  .results h2{margin:0 0 4px;text-align:center;color:var(--navy);font-size:18px}
  .gradehero{font-size:58px;font-weight:800;color:var(--accent);text-align:center;line-height:1.05}
  .gradehero span{font-size:20px;color:var(--muted);font-weight:600}
  .hero2{text-align:center;font-size:16px;font-weight:700;color:var(--ink)}
  .hero3{text-align:center;font-size:12.5px;color:var(--ink);margin:8px 0 16px}
  .hero3 .muted{color:var(--muted)}
  .restable{width:100%;border-collapse:collapse;font-size:13px}
  .restable th,.restable td{border:1px solid #e6e6f0;padding:5px 9px}
  .restable th{background:#f0f0f8;text-align:left}
  .restable td.ic{text-align:center;font-weight:700}
  .restable td.num{text-align:right;font-variant-numeric:tabular-nums}
  .restable tr.correct{background:#eef7ec}
  .restable tr.wrong{background:#fbeeec}
  .restable tr.partial{background:#fcf6e3}
  .restable tr.blank{background:#f5f5f8}
  .bonustag{font-size:10px;background:#e7e2f3;color:var(--navy);padding:1px 6px;border-radius:8px}
  .resbtns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
</style>
</head>
<body>
  <header id="topbar">
    <button class="menubtn" onclick="toggleDrawer(true)" aria-label="Open menu">&#9776;</button>
    <div class="tbtitle">FA / MA Exam</div>
    <div id="miniTimer" class="minitimer" onclick="toggleDrawer(true)"></div>
  </header>
  <div id="drawerOverlay" onclick="toggleDrawer(false)"></div>
  <aside id="sidebar">
    <h1>FA / MA — Practice Exam</h1>
    <div class="sub">9 questions · timed 2:00:00</div>
    <div class="modepanel">
      <button class="modebtn" id="modeSowiso" onclick="setMode('sowiso')">SOWISO</button>
      <button class="modebtn" id="modeExam" onclick="setMode('exam')">Exam</button>
    </div>
    <div class="modehint" id="modeHint"></div>
    <div class="timerbox" id="timerbox"></div>
    <div class="score" id="scorePanel"></div>
    <nav id="nav"></nav>
    <button class="handin" id="handinBtn" onclick="handIn()">Hand in &amp; see score</button>
    <button class="resetbtn" onclick="resetAll()">Reset everything (new attempt)</button>
  </aside>

  <main id="main">
    <div class="stage">
      <div class="progressdots" id="dots"></div>
      <div class="toast" id="toast">✔ <span id="toastTxt">You already master this exercise</span></div>
      <div class="card" id="card"></div>
      <div class="pager">
        <button id="prevBtn" onclick="go(-1)">‹ Previous</button>
        <button id="nextBtn" onclick="go(1)">Next ›</button>
      </div>
    </div>
  </main>

  <div id="calcModal" onclick="if(event.target.id==='calcModal')toggleCalc(false)">
    <div class="calc">
      <div class="disp" id="calcDisp">0</div>
      <div class="grid">
        <button class="fn" onclick="calcClear()">C</button>
        <button class="fn" onclick="calcDel()">⌫</button>
        <button class="op" onclick="calcIn('(')">(</button>
        <button class="op" onclick="calcIn(')')">)</button>
        <button onclick="calcIn('7')">7</button><button onclick="calcIn('8')">8</button><button onclick="calcIn('9')">9</button><button class="op" onclick="calcIn('/')">÷</button>
        <button onclick="calcIn('4')">4</button><button onclick="calcIn('5')">5</button><button onclick="calcIn('6')">6</button><button class="op" onclick="calcIn('*')">×</button>
        <button onclick="calcIn('1')">1</button><button onclick="calcIn('2')">2</button><button onclick="calcIn('3')">3</button><button class="op" onclick="calcIn('-')">−</button>
        <button onclick="calcIn('0')">0</button><button onclick="calcIn('.')">.</button><button class="eq" onclick="calcEq()">=</button><button class="op" onclick="calcIn('+')">+</button>
      </div>
      <button class="close" onclick="toggleCalc(false)">Close</button>
    </div>
  </div>

  <div id="resultsModal" onclick="if(event.target.id==='resultsModal')closeResults()">
    <div class="results" id="resultsInner"></div>
  </div>

<script>
/* ===================== SHARED CONTEXTS ===================== */
const CTX_EQUITY = `<h4>Case — Pasta Mamma (FA Equity)</h4>
<p>The equity section of Pasta Mamma&rsquo;s balance sheet on <b>1 January 2022</b> is as follows:</p>
<table class="data"><tr><th>Item</th><th class="num">Amount</th></tr>
<tr><td>Share capital &ndash; ordinary (nominal value &euro;5 per share)</td><td class="num">&euro;1,950,000</td></tr>
<tr><td>Share premium &ndash; ordinary</td><td class="num">&euro;7,020,000</td></tr>
<tr><td>Treasury (ordinary) shares &ndash; repurchase price &euro;22</td><td class="num">&euro;1,980,000</td></tr>
<tr><td>Share premium &ndash; treasury shares</td><td class="num">&euro;20,000</td></tr>
<tr><td>Share capital &ndash; 13% cumulative preference (nominal &euro;30/share)</td><td class="num">&euro;1,500,000</td></tr>
<tr><td>Share premium &ndash; 13% cumulative preference</td><td class="num">&euro;3,700,000</td></tr>
<tr><td>Retained earnings</td><td class="num">&euro;4,280,000</td></tr></table>
<p style="margin-top:10px">Transactions in 2022:</p>
<p>&bull; <b>May 31</b>: issues 27,000 repurchased ordinary shares for &euro;756,000.<br>

{ title:"FA — Dilutive Securities / EPS", items:[
  { id:"2a", pts:2.0, type:"mc",
    prompt:`<p class="instr">Which statement is correct?</p>`,
    options:[
      "The value of the debt component of a convertible bond is found by deducting the nominal value of the conversion option from total proceeds (with-and-without method).",
      "When preference shares are repurchased for more than their issue price, the difference is recognized as a loss in the income statement.",
      "When convertible bonds are settled before maturity, the issuer books a gain when the fair value of the debt component is higher than its book value.",
      "Convertible bonds give the issuer the benefit of a lower interest rate than an otherwise similar non-convertible bond."],
    answer:3,
    solution:`<p><b>Last option is correct.</b> The conversion option lets the issuer pay a lower coupon than a plain bond.</p>
    <p>Why the others fail: (1) the <i>debt</i> component is measured directly (PV at market rate); equity is the residual. (2) The excess is charged to equity (share premium / retained earnings), not the income statement. (3) Fair value &gt; book value of debt gives a <i>loss</i>, not a gain.</p>` },

  { id:"2b", pts:2.0, type:"mc",
    prompt:`<p class="instr">Which statement is correct?</p><p class="note">(Assume conversion/exercise increases ordinary shares outstanding.)</p>`,
    options:[
      "Conversion of convertible preference shares will always increase Return-On-Equity for the year.",
      "When there is a loss per share (negative EPS), exercising warrants has an anti-dilutive effect.",
      "Conversion of convertible bonds will always increase total assets for the year.",
      "Repurchasing a convertible bond at maturity decreases profit per share for the year."],
    answer:1,
    solution:`<p><b>Second option is correct.</b> With a net loss, adding shares makes the loss-per-share <i>smaller</i> (less negative) &rarr; anti-dilutive. In fact, all potential ordinary shares are anti-dilutive when there is a net loss. The others are not always true / are false.</p>` },

  { id:"2c", pts:6.5, type:"numeric", context:CTX_ODIN,
    prompt:`<p class="instr">Calculate the weighted average number of ordinary shares in 2022.</p><p class="note">[Round to a whole number if necessary.]</p>`,
    layout:"table", tableHead:["Period","Weighted shares"],
    fields:[
      {label:"Jan 1 – Apr 30",value:800000,tol:2},
      {label:"May 1 – Jun 30",value:440000,tol:2},
      {label:"Jul 1 – Oct 31",value:880000,tol:2},
      {label:"Nov 1 – Dec 31",value:448333,tol:3},
      {label:"WEIGHTED AVERAGE (2022)",value:2568333,tol:5,bold:true}],
    solution:`<p>The 20% stock dividend (July 1) is applied <b>retroactively</b> to shares outstanding before it (&times;1.2).</p>
    <table><tr><th>Period</th><th>Shares</th><th>Restatement</th><th class="num">Weighted</th></tr>
    <tr><td>Jan 1 &ndash; Apr 30 (4 mo)</td><td>2,000,000</td><td>&times;1.2</td><td class="num">800,000</td></tr>
    <tr><td>May 1 &ndash; Jun 30 (2 mo)</td><td>2,200,000</td><td>&times;1.2</td><td class="num">440,000</td></tr>
    <tr><td>Jul 1 &ndash; Oct 31 (4 mo)</td><td>2,640,000</td><td>N/A</td><td class="num">880,000</td></tr>
    <tr><td>Nov 1 &ndash; Dec 31 (2 mo)</td><td>2,690,000</td><td>N/A</td><td class="num">448,333</td></tr>
    <tr><td colspan="3"><b>Weighted average</b></td><td class="num"><b>2,568,333</b></td></tr></table>
    <p>e.g. 2,000,000 &times;1.2 &times; 4/12 = 800,000; (2,200,000&times;1.2)&times;2/12 = 440,000; 2,640,000&times;4/12 = 880,000; 2,690,000&times;2/12 = 448,333.</p>` },

  { id:"2d", pts:3.0, type:"numeric", context:CTX_WORLD,
    prompt:`<p class="instr">Calculate the value of the conversion option (equity component) of the convertible bonds.</p>`,
    fields:[{label:"Equity component",pre:"EUR",value:14464,tol:8}],
    solution:`<p>Measure the debt component as the PV of cash flows at the <b>market rate (7%)</b>. Coupon = 5% &times; 400,000 = 20,000/yr; principal 400,000 repaid Jan 1, 2025 (2 years).</p>
    <table><tr><th>Cash flow</th><th class="num">Amount</th><th class="num">PV @7%</th></tr>
    <tr><td>Interest, end 2023</td><td class="num">20,000</td><td class="num">18,692</td></tr>
    <tr><td>Interest + principal, end 2024</td><td class="num">420,000</td><td class="num">366,844</td></tr>
    <tr><td><b>Debt component</b></td><td></td><td class="num"><b>385,536</b></td></tr></table>
    <p>Equity component = 400,000 &minus; 385,536 = <b>&asymp; EUR 14,464</b>.</p>` },

  { id:"2e", pts:6.5, type:"numeric", context:CTX_WORLD,
    prompt:`<p class="instr">Calculate basic and diluted EPS, and indicate the incremental effects of the convertible preference shares and warrants.</p>`,
    fields:[
      {label:"Basic EPS",pre:"EUR",value:5.00,tol:0.02},
      {label:"Diluted EPS",pre:"EUR",value:4.92,tol:0.04}],
    solution:`<p><b>Basic EPS</b> = 15,000,000 &divide; 3,000,000 = <b>EUR 5.00</b> (no preference dividend deducted &ndash; non-cumulative, none declared).</p>
    <p><b>Incremental effects</b></p>
    <p>&bull; Convertible preference: 0 &divide; 20,000 = <b>0.00</b> (no preference dividends) &rarr; dilutive.<br>
    &bull; Warrants: <b>anti-dilutive</b> &ndash; not exercised, exercise price (25) &gt; average share price (15).<br>
    &bull; Convertible bonds: 20,000 &times; (1 &minus; 0.22) &divide; 30,000 = 15,600 &divide; 30,000 = <b>0.52</b>.</p>
    <p><b>Diluted EPS</b> (add the dilutive securities one by one):</p>
    <p>1. After preference: (15,000,000 + 0) &divide; (3,000,000 + 20,000) = <b>4.97</b><br>
    2. After bonds: (15,000,000 + 15,600) &divide; (3,020,000 + 30,000) = 15,015,600 &divide; 3,050,000 = <b>EUR 4.92</b></p>
    <p>The bond add-back is the after-tax interest: 20,000 &times; (1 &minus; 0.22) = 15,600.</p>` },
]},

{ title:"FA — Tax", items:[

    prompt:`<p class="instr">Paying less taxes now than you owe based on financial (book) income leads to&hellip;</p>`,

  { id:"3b", pts:2.5, type:"mc",
    prompt:`<p class="instr">Which of the following statements is correct?</p>`,

  { id:"3f", pts:3.0, type:"numeric", context:CTX_GREEN,
    prompt:`<p class="instr">Compute the total change (ending &minus; opening) of the deferred tax liability (DTL) for 2022.</p>`,
    fields:[{label:"Change in DTL",pre:"€",value:12300,tol:1}],
    solution:`<p>Increase in DTL = [book-tax difference (i)] + [depreciation], each future reversal &times; that year&rsquo;s enacted rate:</p>
    <p><b>Difference (i):</b> 10,000&times;40% + 25,000&times;30% = 4,000 + 7,500 = <b>11,500</b><br>
    (the 25,000 = 5,000 in 2024 + 20,000 in 2025, both at 30%).</p>
    <p><b>Depreciation:</b> &minus;16,000&times;40% + 8,000&times;30% + 16,000&times;30% = &minus;6,400 + 2,400 + 4,800 = <b>800</b><br>
    (in 2023 tax depreciation exceeds book by a further 16,000 at 40%; in 2024 and 2025 the difference reverses as book exceeds tax by 8,000 and 16,000 at 30%).</p>
    <p><b>Change in DTL = 11,500 + 800 = €12,300</b> (opening balance was 0).</p>` },

    solution:`<p>Compare the closing balances:</p>
    <p><b>DTL:</b> 12,300 (end 2022) &rarr; 14,700 (end 2023) = <b>+2,400 credit</b>.<br>
    DTL 2023 = 25,000&times;30% (diff i remaining) + (8,000+16,000)&times;30% (depreciation) = 7,500 + 7,200 = 14,700.</p>
    <p><b>DTA:</b> 10,600 (end 2022) &rarr; 9,000 (end 2023) = <b>&minus;1,600 (credit / decrease)</b>.<br>
    DTA 2023 = 30,000&times;30% = 9,000.</p>
    <p>So: <b>DTA 1,600 credit, DTL 2,400 credit</b> (first option).</p>` },
]},

{ title:"FA — Revenue Recognition", items:[

    prompt:`<p class="instr">In the context of consignments, which statement is <u>incorrect</u>?</p>`,

/* ===================== STATE ===================== */
const TOTAL_MS = 2*60*60*1000; // 2 hours
const FLAT=[]; EXAM.forEach((s,si)=>s.items.forEach((q)=>{q._s=si;q._sectionTitle=s.title;q._bonus=/bonus/i.test(s.title);FLAT.push(q);}));
const TOTAL=FLAT.length;
const MAXPTS=FLAT.filter(q=>!q._bonus).reduce((a,q)=>a+q.pts,0); // gradeable max (bonus excluded)
let cur=0;

const S = Object.assign({mode:'sowiso',phase:'answering',answers:{},checked:{},results:null}, JSON.parse(localStorage.getItem('famaState')||'{}'));
const T = Object.assign({elapsedMs:0,running:false,lastStart:0,hidden:false}, JSON.parse(localStorage.getItem('famaTimer')||'{}'));
let timerInt=null;

function saveState(){localStorage.setItem('famaState',JSON.stringify({mode:S.mode,phase:S.phase,answers:S.answers,checked:S.checked,results:S.results}));}
function saveTimer(){localStorage.setItem('famaTimer',JSON.stringify({elapsedMs:T.elapsedMs,running:T.running,lastStart:T.lastStart,hidden:T.hidden}));}
function num(v){const n=parseFloat(String(v).replace(/[,\s€$£%]/g,''));return isNaN(n)?null:n;}
function esc(s){return String(s==null?'':s).replace(/"/g,'&quot;');}
function fmt(ms){const s=Math.max(0,Math.floor(ms/1000));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return h+':'+String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');}

/* ===================== TIMER ===================== */
function timerElapsed(){return T.elapsedMs+(T.running?(Date.now()-T.lastStart):0);}
function timerRemaining(){return Math.max(0,TOTAL_MS-timerElapsed());}
function timerStart(){if(T.running)return;T.running=true;T.lastStart=Date.now();saveTimer();tickTimer();}
function timerPause(){if(!T.running)return;T.elapsedMs=timerElapsed();T.running=false;T.lastStart=0;clearInterval(timerInt);saveTimer();renderTimer();}
function timerReset(){if(!confirm('Reset the timer to 2:00:00?'))return;T.elapsedMs=0;T.running=false;T.lastStart=0;clearInterval(timerInt);saveTimer();renderTimer();}
function timerToggleHide(){T.hidden=!T.hidden;saveTimer();renderTimer();}
function tickTimer(){clearInterval(timerInt);timerInt=setInterval(renderTimer,1000);renderTimer();}

/* ===================== ANSWER HELPERS ===================== */
function isAnswered(qid){const a=S.answers[qid];if(!a)return false;const q=FLAT.find(x=>x.id===qid);
  if(q.type==='mc')return a.mc!=null&&a.mc>=0;
  if(q.type==='numeric')return (a.nums||[]).some(x=>String(x).trim()!=='');
  if(q.type==='journal')return (a.rows||[]).some(r=>r.account&&((num(r.debit)||0)||(num(r.credit)||0)));
  return false;}
function gradeQuestion(q){
  const a=S.answers[q.id];
  if(q.type==='mc'){if(!a||a.mc==null||a.mc<0)return{status:'blank',frac:0};return a.mc===q.answer?{status:'correct',frac:1}:{status:'wrong',frac:0};}
  if(q.type==='numeric'){const nums=(a&&a.nums)||[];if(!nums.some(x=>String(x).trim()!==''))return{status:'blank',frac:0};
    let c=0;q.fields.forEach((f,i)=>{const v=num(nums[i]);if(v!==null&&Math.abs(v-f.value)<=(f.tol??1))c++;});
    const frac=c/q.fields.length;return{status:frac===1?'correct':(frac>0?'partial':'wrong'),frac};}
  if(q.type==='journal'){const rows=((a&&a.rows)||[]).filter(r=>r.account&&((num(r.debit)||0)||(num(r.credit)||0)));
    if(!rows.length)return{status:'blank',frac:0};
    const need=q.rows.map(r=>({...r,used:false}));let m=0;
    rows.forEach(r=>{const f=need.find(n=>!n.used&&n.account===r.account&&Math.abs(n.debit-(num(r.debit)||0))<=1&&Math.abs(n.credit-(num(r.credit)||0))<=1);if(f){f.used=true;m++;}});
    const frac=m/q.rows.length;return{status:(m===q.rows.length&&rows.length===q.rows.length)?'correct':(m>0?'partial':'wrong'),frac};}
}

/* ===================== RENDER ===================== */
function isLocked(qid){return S.phase==='submitted'||(S.mode==='sowiso'&&S.checked[qid]&&S.checked[qid].solViewed);}
function render(){
  const q=FLAT[cur];
  const rec=S.checked[q.id];
  const reveal=(S.mode==='sowiso'&&rec)||S.phase==='submitted';
  // dots
  const sec=EXAM[q._s];const dots=document.getElementById('dots');dots.innerHTML='';
  sec.items.forEach(it=>{const d=document.createElement('div');d.className='d '+dotClass(it.id);d.title='Q'+it.id;d.style.cursor='pointer';d.onclick=()=>{capture();cur=FLAT.indexOf(it);render();};dots.appendChild(d);});
  // mastery toast (clean first-try correct only)
  const toast=document.getElementById('toast');
  if(S.mode==='sowiso'&&S.phase!=='submitted'&&rec&&rec.status==='correct'&&(rec.attempts||1)<=1&&!rec.peeked){toast.classList.add('show');document.getElementById('toastTxt').textContent='You already master '+q.id.toUpperCase();}
  else toast.classList.remove('show');
  // actions depend on mode/phase
  let actions;
  if(S.phase==='submitted'){
    actions=`<span class="spacer"></span><button class="btn ghost" onclick="toggleCalc(true)">&#9636; Calculator</button><button class="btn ghost" onclick="showSolution()">&#10022; Solution</button>`;
  }else if(S.mode==='sowiso'){
    actions=`<button class="btn check" onclick="check()" ${isLocked(q.id)?'disabled style="opacity:.4;cursor:default"':''}>&#10003; Check</button><span class="spacer"></span><button class="btn ghost" onclick="toggleCalc(true)">&#9636; Calculator</button><button class="btn ghost" onclick="showSolution()">&#10022; Solution</button>`;
  }else{
    actions=`<span class="exnote">Exam mode &middot; graded when you hand in</span><span class="spacer"></span><button class="btn ghost" onclick="toggleCalc(true)">&#9636; Calculator</button>`;
  }
  const c=document.getElementById('card');
  let html=`<div class="crumb">${q._sectionTitle}</div>
    <div class="qtitle"><span class="pencil">&#9998;</span> Question ${q.id.toUpperCase()}<span class="badge">${q.pts} pt</span></div>
    <hr class="rule">`;
  if(q.context) html+=`<div class="context">${q.context}</div>`;
  html+=`<div class="qbody">${q.prompt}</div>`;
  html+=`<div id="inputArea">${renderInput(q)}</div>`;
  html+=`<div class="actions">${actions}</div>
    <div class="feedback" id="feedback"></div>
    <div class="solution" id="solution"><h4>Solution</h4>${q.solution}</div>`;
  c.innerHTML=html;
  if(reveal){
    const g=markQuestion(q);
    if(S.phase==='submitted'){
      document.getElementById('solution').classList.add('show');
      setFB(g.status,resultLine(q));
    }else{
      if(rec.status==='correct'){
        const clean=(rec.attempts||1)<=1&&!rec.peeked;
        setFB(clean?'correct':'partial',clean?'&#10003; Correct!':'&#10003; Correct &ndash; but not on your first try.');
      }else if(rec.solViewed){
        setFB('partial','Solution shown &ndash; this question is now locked. The answer is in the solution below.');
      }else{
        setFB(g.status,feedbackMsg(q,g));
      }
      if(rec.solViewed)document.getElementById('solution').classList.add('show');
    }
  }
  if(isLocked(q.id)){
    document.querySelectorAll('#inputArea input,#inputArea select').forEach(el=>el.disabled=true);
    document.querySelectorAll('#inputArea .opt').forEach(el=>el.style.pointerEvents='none');
    document.querySelectorAll('#inputArea .trash,#inputArea .addrow').forEach(el=>el.style.display='none');
  }
  document.getElementById('prevBtn').disabled=(cur===0);
  document.getElementById('nextBtn').disabled=(cur===TOTAL-1);
  renderSidebar();
}

function dotClass(qid){
  if(S.phase==='submitted'){const s=S.checked[qid];return s?(s.status==='correct'?'correct':s.status==='partial'?'partial':s.status==='blank'?'':'attempted'):'';}
  if(S.mode==='sowiso'){const s=S.checked[qid];if(!s)return '';
    if(s.status==='correct')return ((s.attempts||1)>1||s.peeked)?'partial':'correct';
    if(s.solViewed)return 'partial';
    if(s.status==='wrong'||s.status==='partial')return 'attempted';
    return '';}
  return isAnswered(qid)?'answered':'';
}

function renderInput(q){
  const A=S.answers[q.id]||{};
  if(q.type==='mc'){
    return `<div class="opts">`+q.options.map((o,i)=>`<div class="opt${A.mc===i?' sel':''}" data-i="${i}" onclick="selOpt(${i})"><span class="mark">&#10003;</span><span>${o}</span></div>`).join('')+`</div>`;
  }
  if(q.type==='numeric'){
    const vals=A.nums||[];
    if(q.layout==='table'){
      let r=`<table class="jrnl"><tr><th>${q.tableHead[0]}</th><th class="num">${q.tableHead[1]}</th></tr>`;
      q.fields.forEach((f,i)=>{r+=`<tr><td ${f.bold?'style="font-weight:700"':''}>${f.label}</td><td class="num"><input class="ninput" id="nf${i}" inputmode="decimal" value="${esc(vals[i])}" oninput="capture()"></td></tr>`;});
      return r+`</table>`;
    }
    return q.fields.map((f,i)=>`<div class="nfield"><label>${f.label}</label>${f.pre?`<span class="pre">${f.pre}</span>`:''}<input class="ninput" id="nf${i}" inputmode="decimal" value="${esc(vals[i])}" oninput="capture()">${f.suf?`<span class="pre">${f.suf}</span>`:''}<span class="ftick" id="ft${i}"></span></div>`).join('');
  }
  if(q.type==='journal'){
    const opt=a=>`<option value="">Select</option>`+q.accounts.map(x=>`<option ${x===a?'selected':''}>${x}</option>`).join('');
    const rows=(A.rows&&A.rows.length)?A.rows:Array.from({length:Math.max(2,q.rows.length)},()=>({account:'',debit:'',credit:''}));
    let r=`<table class="jrnl" id="jt"><tr><th>Account</th><th class="num">Debit</th><th class="num">Credit</th><th></th></tr>`;
    rows.forEach(row=>{r+=`<tr><td><select class="selacct" onchange="capture()">${opt(row.account)}</select></td><td class="num"><input class="amt" inputmode="decimal" value="${esc(row.debit)}" oninput="capture()"></td><td class="num"><input class="amt" inputmode="decimal" value="${esc(row.credit)}" oninput="capture()"></td><td><button class="trash" onclick="delRow(this)">&#128465;</button></td></tr>`;});
    return r+`</table><button class="addrow" onclick="addRow()">+ Add a journal entry</button>`;
  }
  return '';
}

function markQuestion(q){
  const g=gradeQuestion(q);
  if(q.type==='mc'){const A=S.answers[q.id]||{};const rec=S.checked[q.id];
    const orange=S.phase!=='submitted'&&rec&&((rec.status==='correct'&&((rec.attempts||1)>1||rec.peeked))||(rec.solViewed&&rec.status!=='correct'));
    document.querySelectorAll('.opt').forEach((o,i)=>{o.classList.remove('right','wrong','rightmid');if(i===q.answer)o.classList.add(orange?'rightmid':'right');if(A.mc===i&&i!==q.answer)o.classList.add('wrong');});
  }else if(q.type==='numeric'){const nums=(S.answers[q.id]&&S.answers[q.id].nums)||[];
    q.fields.forEach((f,i)=>{const el=document.getElementById('nf'+i);if(!el)return;const t=document.getElementById('ft'+i);const raw=nums[i];if(raw==null||String(raw).trim()===''){el.classList.remove('ok','no');if(t){t.className='ftick';t.innerHTML='';}return;}const v=num(raw);const good=v!==null&&Math.abs(v-f.value)<=(f.tol??1);el.classList.toggle('ok',good);el.classList.toggle('no',!good);if(t){t.className='ftick '+(good?'ok':'no');t.innerHTML=good?'&#10003;':'&#10007;';}});
  }else if(q.type==='journal'){const need=q.rows.map(r=>({...r,used:false}));
    [...document.querySelectorAll('#jt tr')].slice(1).forEach(tr=>{const sel=tr.querySelector('select');const ins=tr.querySelectorAll('input');const acc=sel?sel.value:'';const d=num(ins[0].value)||0;const cc=num(ins[1].value)||0;ins[0].classList.remove('ok','no');ins[1].classList.remove('ok','no');if(!acc&&!d&&!cc)return;const m=need.find(n=>!n.used&&n.account===acc&&Math.abs(n.debit-d)<=1&&Math.abs(n.credit-cc)<=1);if(m){m.used=true;ins[0].classList.add('ok');ins[1].classList.add('ok');}else{ins[0].classList.add('no');ins[1].classList.add('no');}});
  }
  return g;
}

function setFB(status,html){const f=document.getElementById('feedback');if(!f)return;const cls=(status===true||status==='correct')?'good':(status==='partial'?'mid':'bad');f.className='feedback show '+cls;f.innerHTML=html;}
function feedbackMsg(q,g){
  if(g.status==='correct')return '&#10003; Correct!';
  if(g.status==='partial')return '&#9685; Partially correct ('+Math.round(g.frac*100)+'%) &ndash; click Solution to see the full answer.';
  return q.type==='mc'
    ? '&#10007; Not quite &ndash; the correct option is shown in green. Click Solution for why.'
    : '&#10007; Incorrect &ndash; click Solution to see the correct answer.';
}
function resultLine(q){const r=S.results.per[q.id];const lab={correct:'&#10003; Correct',wrong:'&#10007; Wrong',partial:'&#9685; Partially correct',blank:'&ndash; Left blank'}[r.status];return `${lab} &middot; ${r.pts>=0?'+':''}${r.pts.toFixed(2)} / ${q.pts} pts`;}

/* ===================== SIDEBAR ===================== */
function renderSidebar(){
  document.getElementById('modeSowiso').classList.toggle('active',S.mode==='sowiso');
  document.getElementById('modeExam').classList.toggle('active',S.mode==='exam');
  document.getElementById('modeHint').innerHTML = S.phase==='submitted' ? 'Reviewing your handed-in answers.' : (S.mode==='sowiso'?'Practice: Check &amp; Solution after each question.':'Exam: no feedback until you hand in.');
  renderTimer();
  renderScore();
  document.getElementById('handinBtn').style.display = S.phase==='submitted' ? 'none' : 'block';
  const nav=document.getElementById('nav');nav.innerHTML='';
  EXAM.forEach(s=>{const h=document.createElement('div');h.className='secttl';h.textContent=s.title;nav.appendChild(h);
    s.items.forEach(q=>{const idx=FLAT.indexOf(q);const it=document.createElement('div');it.className='navitem'+(idx===cur?' active':'');it.onclick=()=>{capture();cur=idx;render();toggleDrawer(false);};it.innerHTML=`<span class="dot ${dotClass(q.id)}"></span><span>Q${q.id.toUpperCase()}</span><span class="pts">${q.pts} pt</span>`;nav.appendChild(it);});
  });
}
function renderScore(){
  const p=document.getElementById('scorePanel');
  if(S.phase==='submitted'&&S.results){const R=S.results;
    p.innerHTML=`<div class="gradebig">${R.grade.toFixed(1)}<span>/10</span></div><div class="gradesub">${R.total.toFixed(1)} / ${R.maxPts} pts &middot; &#9201; ${fmt(R.timeMs)}</div><div class="bar"><i style="width:${Math.min(100,R.total/R.maxPts*100)}%"></i></div><button class="reviewbtn" onclick="showResults()">View result summary</button>`;return;}
  if(S.mode==='exam'){const ans=FLAT.filter(q=>isAnswered(q.id)).length;p.innerHTML=`<div><b>${ans}</b> / ${TOTAL} answered</div><div class="bar"><i style="width:${ans/TOTAL*100}%"></i></div>`;return;}
  const done=FLAT.filter(q=>S.checked[q.id]&&S.checked[q.id].status==='correct').length;p.innerHTML=`<div><b>${done}</b> / ${TOTAL} correct</div><div class="bar"><i style="width:${done/TOTAL*100}%"></i></div>`;
}
function toggleDrawer(open){const sb=document.getElementById('sidebar');const ov=document.getElementById('drawerOverlay');if(open===undefined)open=!sb.classList.contains('open');sb.classList.toggle('open',open);ov.classList.toggle('open',open);}
function renderTimer(){
  const rem=timerRemaining();const up=rem<=0;
  const mini=document.getElementById('miniTimer');
  if(mini){mini.textContent=T.hidden?'—:—':(up?'0:00:00':fmt(rem));mini.classList.toggle('up',up&&!T.hidden);}
  const box=document.getElementById('timerbox');if(!box)return;
  if(T.hidden){box.innerHTML=`<button class="tbtn wide" onclick="timerToggleHide()">Show timer</button>`;return;}
  box.innerHTML=`<div class="timer ${up?'up':''}">${up?'0:00:00':fmt(rem)}</div>${up?'<div class="timeup">Time&rsquo;s up &ndash; you can still continue</div>':''}<div class="trow"><button class="tbtn" onclick="${T.running?'timerPause()':'timerStart()'}">${T.running?'Pause':'Start'}</button><button class="tbtn" onclick="timerReset()">Reset</button><button class="tbtn" onclick="timerToggleHide()">Hide</button></div>`;
}

/* ===================== INPUT CAPTURE ===================== */
function selOpt(i){const q=FLAT[cur];if(isLocked(q.id))return;S.answers[q.id]={mc:i};saveState();document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));const el=document.querySelector('.opt[data-i="'+i+'"]');if(el)el.classList.add('sel');renderSidebar();}
function capture(){const q=FLAT[cur];if(!q||isLocked(q.id))return;
  if(q.type==='numeric'){S.answers[q.id]={nums:q.fields.map((f,i)=>{const el=document.getElementById('nf'+i);return el?el.value:'';})};}
  else if(q.type==='journal'){S.answers[q.id]={rows:[...document.querySelectorAll('#jt tr')].slice(1).map(tr=>{const sel=tr.querySelector('select');const ins=tr.querySelectorAll('input');return{account:sel?sel.value:'',debit:ins[0]?ins[0].value:'',credit:ins[1]?ins[1].value:''};})};}
  else return;
  saveState();if(S.mode==='exam')renderSidebar();}
function addRow(){if(isLocked(FLAT[cur].id))return;capture();const q=FLAT[cur];S.answers[q.id]=S.answers[q.id]||{rows:[]};S.answers[q.id].rows=S.answers[q.id].rows||[];S.answers[q.id].rows.push({account:'',debit:'',credit:''});saveState();render();}
function delRow(b){if(isLocked(FLAT[cur].id))return;capture();const tr=b.closest('tr');const idx=[...tr.parentNode.rows].indexOf(tr)-1;const q=FLAT[cur];const rows=(S.answers[q.id]&&S.answers[q.id].rows)||[];if(rows.length>2){rows.splice(idx,1);saveState();render();}}

/* ===================== CHECK (SOWISO) ===================== */
function check(){const q=FLAT[cur];if(isLocked(q.id))return;capture();
  if(q.type==='mc'&&(!S.answers[q.id]||S.answers[q.id].mc==null||S.answers[q.id].mc<0)){setFB('blank','Select an option first.');return;}
  const rec=S.checked[q.id]||{attempts:0,solViewed:false,peeked:false};
  rec.attempts=(rec.attempts||0)+1;
  const g=gradeQuestion(q);rec.status=g.status;rec.frac=g.frac;S.checked[q.id]=rec;saveState();
  markQuestion(q);
  if(g.status==='correct'){
    const clean=rec.attempts<=1&&!rec.peeked;
    setFB(clean?'correct':'partial',clean?'&#10003; Correct!':'&#10003; Correct &ndash; but not on your first try.');
    if(clean){const t=document.getElementById('toast');t.classList.add('show');document.getElementById('toastTxt').textContent='You already master '+q.id.toUpperCase();}
  }else{
    setFB(g.status,feedbackMsg(q,g));
  }
  renderSidebar();
}
function showSolution(){const q=FLAT[cur];const s=document.getElementById('solution');const opening=!s.classList.contains('show');
  if(opening&&S.mode==='sowiso'&&S.phase!=='submitted'){const rec=S.checked[q.id]||{attempts:0,status:'blank',frac:0};rec.solViewed=true;if(rec.status!=='correct')rec.peeked=true;if(!rec.status)rec.status='blank';S.checked[q.id]=rec;saveState();render();const sol=document.getElementById('solution');sol.classList.add('show');sol.scrollIntoView({behavior:'smooth',block:'nearest'});return;}
  s.classList.toggle('show');s.scrollIntoView({behavior:'smooth',block:'nearest'});}
function go(d){capture();cur=Math.min(TOTAL-1,Math.max(0,cur+d));render();window.scrollTo(0,0);document.getElementById('main').scrollTo(0,0);}

/* ===================== MODE + HAND-IN ===================== */
function setMode(m){if(m===S.mode&&S.phase!=='submitted')return;capture();S.mode=m;if(S.phase==='submitted'){S.phase='answering';S.results=null;}saveState();render();}
function handIn(){toggleDrawer(false);capture();const answered=FLAT.filter(q=>isAnswered(q.id)).length;
  if(!confirm('Hand in now? '+answered+' of '+TOTAL+' answered.\n\nYou will see your score and the correct answers.'))return;
  timerPause();gradeAll();S.phase='submitted';saveState();render();showResults();}
function gradeAll(){let earned=0,bonus=0,mcR=0,mcW=0,mcB=0;const per={};
  FLAT.forEach(q=>{const g=gradeQuestion(q);let p=0;
    if(q.type==='mc'){if(g.status==='correct'){p=q.pts;mcR++;}else if(g.status==='wrong'){p=0;mcW++;}else{p=0;mcB++;}}
    else{p=q.pts*g.frac;}
    per[q.id]={status:g.status,frac:g.frac,pts:p};S.checked[q.id]={status:g.status,frac:g.frac};
    if(q._bonus)bonus+=p;else earned+=p;});
  const total=earned+bonus;const grade=Math.max(1,Math.min(10,1+9*(total/MAXPTS)));
  S.results={per,earned,bonus,total,grade,mcR,mcW,mcB,maxPts:MAXPTS,timeMs:timerElapsed()};}
function showResults(){if(!S.results)return;const R=S.results;let rows='';
  FLAT.forEach(q=>{const r=R.per[q.id];const ic={correct:'&#10003;',wrong:'&#10007;',partial:'&#9685;',blank:'&middot;'}[r.status];
    rows+=`<tr class="${r.status}"><td>${q.id.toUpperCase()}${q._bonus?' <span class="bonustag">bonus</span>':''}</td><td class="ic">${ic}</td><td class="num">${r.pts>=0?'+':''}${r.pts.toFixed(2)}</td><td class="num">${q.pts}</td></tr>`;});
  document.getElementById('resultsInner').innerHTML=`<h2>Exam handed in</h2>
    <div class="gradehero">${R.grade.toFixed(1)}<span>/ 10</span></div>
    <div class="hero2">${R.total.toFixed(1)} / ${R.maxPts} points${R.bonus?` (incl. bonus +${R.bonus.toFixed(2)})`:''}</div>
    <div class="hero3">&#9201; Time used <b>${fmt(R.timeMs)}</b> &nbsp;&middot;&nbsp; MC: ${R.mcR}&#10003; / ${R.mcW}&#10007; / ${R.mcB}&middot;</div>
    <table class="restable"><tr><th>Q</th><th></th><th class="num">Earned</th><th class="num">Max</th></tr>${rows}</table>
    <div class="resbtns"><button class="btn check" onclick="closeResults()">Review answers &amp; solutions</button><button class="btn ghost" onclick="resetAll()">New attempt</button></div>`;
  document.getElementById('resultsModal').classList.add('show');}
function closeResults(){document.getElementById('resultsModal').classList.remove('show');}
function resetAll(){if(!confirm('Start a new attempt? This clears your answers, score and timer.'))return;S.answers={};S.checked={};S.results=null;S.phase='answering';T.elapsedMs=0;T.running=false;T.lastStart=0;clearInterval(timerInt);cur=0;saveState();saveTimer();closeResults();render();}

/* ===================== CALCULATOR ===================== */
let calcStr='';
function toggleCalc(show){document.getElementById('calcModal').classList.toggle('show',show);}
function calcIn(c){calcStr+=c;document.getElementById('calcDisp').textContent=calcStr;}
function calcClear(){calcStr='';document.getElementById('calcDisp').textContent='0';}
function calcDel(){calcStr=calcStr.slice(0,-1);document.getElementById('calcDisp').textContent=calcStr||'0';}
function calcEq(){try{const r=Function('"use strict";return ('+calcStr+')')();calcStr=String(r);document.getElementById('calcDisp').textContent=calcStr;}catch(e){document.getElementById('calcDisp').textContent='Error';calcStr='';}}

/* ===================== INIT ===================== */
// Enter = Check (SOWISO mode only)
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  if(S.mode!=='sowiso'||S.phase==='submitted')return;
  if(document.getElementById('calcModal').classList.contains('show'))return;
  if(document.getElementById('resultsModal').classList.contains('show'))return;
  if(document.activeElement&&document.activeElement.tagName==='BUTTON')return; // let a focused button handle its own Enter
  if(isLocked(FLAT[cur].id))return;
  e.preventDefault();
  check();
});
if(T.running)tickTimer();
render();
</script>
</body>
